name: Bittbridge Deployment

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action'
        required: true
        default: 'deploy'
        options: [ 'bootstrap', 'deploy', 'logs', 'import_wallets' ]
  push:
    branches:
      - main

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          echo "$VM_SSH_KEY_B64" | base64 -d > key
          chmod 600 key
          ssh-keygen -y -f key 2>/dev/null
          ssh-keyscan -H "$VM_HOST" 2>/dev/null >> ~/.ssh/known_hosts

      - name: Bootstrap
        run: |
          echo 'Running bootstrap step...'
          # Add your bootstrap commands here

      - name: Import Wallets
        run: |
          echo 'Running import_wallets step...'
          # Add your import_wallets commands here

      - name: Deploy Miner Model
        run: |
          echo 'Deploying miner model...'
          # Add your deploy commands here

      - name: Logs
        run: |
          echo 'Running logs step...'
          # Add your logs commands here
