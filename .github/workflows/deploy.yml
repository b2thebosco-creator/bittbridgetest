name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configure SSH (base64 key + known_hosts)
        run: |
          echo "$SSH_PRIVATE_KEY" | base64 --decode > $HOME/.ssh/id_rsa
          chmod 600 $HOME/.ssh/id_rsa
          ssh-keygen -y 2>/tmp/ssh_keygen_err || { cat /tmp/ssh_keygen_err && exit 1; }
          ssh-keyscan -H example.com 2>/tmp/sshscan_err || { cat /tmp/sshscan_err && exit 1; }
          echo 'Known hosts configured successfully.'
      
      - name: Deploy application
        run: |
          ./deploy_script.sh
        env:
          ENV_VAR: value
